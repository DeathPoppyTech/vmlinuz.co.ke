<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poppy's stuff</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --card-hover: #1f242c;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
      --modal-overlay: rgba(0, 0, 0, 0.75);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 650px;
      width: 100%;
    }

    header {
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.5rem;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .project-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .project-card:hover {
      background-color: var(--card-hover);
      border-color: var(--accent);
    }

    .project-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .project-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--modal-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 1rem;
      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 480px;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .close-btn:hover {
      color: #ffffff;
      background-color: var(--border);
    }

    .modal-options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-btn {
      background-color: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      font-family: inherit;
    }

    .option-btn:hover {
      border-color: var(--accent);
      background-color: #12171f;
    }

    .status-toast {
      font-size: 0.8rem;
      color: #3fb950;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .status-toast.show {
      opacity: 1;
    }

    /* Terminal Selector Sub-Menu */
    .terminal-selector {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .terminal-selector.active {
      display: flex;
    }

    .term-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .term-btn {
      background-color: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .term-btn:hover {
      border-color: var(--accent);
      color: #ffffff;
    }

    .custom-term-input {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .custom-term-input input {
      flex: 1;
      background-color: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .custom-term-input input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .custom-term-input button {
      background-color: var(--border);
      border: none;
      color: #ffffff;
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .custom-term-input button:hover {
      background-color: var(--accent);
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 0.5rem;
    }

    .back-btn:hover {
      color: var(--text);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>poppy's stuff</h1>
      <p class="subtitle">oh, you've stumbled upon one of my sites!</p>
      <p class="subtitle">welcome, this site is mainly just for hosting projects and whatnot.</p>
    </header>

    <main class="projects">
      <div class="project-card" id="mtk-card">
        <div class="project-title">mtkclient linux installer</div>
        <div class="project-desc">wanted a simpler way of installing mtkclient? you can click here!</div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title-text">choose a way to run the script</div>
        <button class="close-btn" id="close-btn">[x]</button>
      </div>

      <!-- Main Options -->
      <div class="modal-options" id="main-options">
        <button class="option-btn" id="open-terminal-btn">
          <span>[open terminal]</span>
        </button>
        <button class="option-btn" id="manual-run-btn">
          <span>[manual run]</span>
          <span class="status-toast" id="copied-toast">copied!</span>
        </button>
      </div>

      <!-- Terminal Choice View -->
      <div class="terminal-selector" id="terminal-selector">
        <p style="font-size: 0.85rem; color: var(--text-muted);">which terminal emulator do you use?</p>
        <div class="term-grid">
          <button class="term-btn" data-term="gnome-terminal">GNOME Terminal</button>
          <button class="term-btn" data-term="kitty">Kitty</button>

          <button class="term-btn" data-term="alacritty">Alacritty</button>
          <button class="term-btn" data-term="foot">Foot</button>
          <button class="term-btn" data-term="konsole">Konsole</button>
          <button class="term-btn" data-term="xfce4-terminal">XFCE Terminal</button>
          <button class="term-btn" data-term="ghostty">Ghostty</button>
          <button class="term-btn" data-term="xterm">xterm</button>
        </div>

        <div class="custom-term-input">
          <input type="text" id="custom-term" placeholder="other (e.g. wezterm, st)" />
          <button id="run-custom-term">Run</button>
        </div>

        <button class="back-btn" id="back-btn">&larr; Back</button>
      </div>
    </div>
  </div>

  <script>
    const mtkCard = document.getElementById('mtk-card');
    const modalOverlay = document.getElementById('modal-overlay');
    const closeBtn = document.getElementById('close-btn');
    const mainOptions = document.getElementById('main-options');
    const terminalSelector = document.getElementById('terminal-selector');
    const modalTitleText = document.getElementById('modal-title-text');

    const openTerminalBtn = document.getElementById('open-terminal-btn');
    const manualRunBtn = document.getElementById('manual-run-btn');
    const copiedToast = document.getElementById('copied-toast');
    const backBtn = document.getElementById('back-btn');
    const customTermInput = document.getElementById('custom-term');
    const runCustomTermBtn = document.getElementById('run-custom-term');

    const SCRIPT_CMD = 'curl -sSL https://vmlinuz.co.ke/bash/mtkclient.sh | bash';

    const showMainView = () => {
      mainOptions.style.display = 'flex';
      terminalSelector.classList.remove('active');
      modalTitleText.textContent = 'choose a way to run the script';
    };

    const showTerminalView = () => {
      mainOptions.style.display = 'none';
      terminalSelector.classList.add('active');
      modalTitleText.textContent = 'select terminal emulator';
    };

    const closeModal = () => {
      modalOverlay.classList.remove('active');
      setTimeout(showMainView, 200);
    };

    mtkCard.addEventListener('click', () => {
      modalOverlay.classList.add('active');
    });

    closeBtn.addEventListener('click', closeModal);
    backBtn.addEventListener('click', showMainView);

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    openTerminalBtn.addEventListener('click', showTerminalView);

    manualRunBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(SCRIPT_CMD);
        copiedToast.classList.add('show');
        setTimeout(() => copiedToast.classList.remove('show'), 2000);
      } catch (err) {
        console.error('Clipboard error:', err);
      }
    });

    const triggerTerminalLaunch = (termExec) => {
      let execString = '';
      const cleanTerm = termExec.trim().toLowerCase();

      switch (cleanTerm) {
        case 'gnome-terminal':
          execString = `gnome-terminal -- bash -c "${SCRIPT_CMD}; exec bash"`;
          break;
        case 'kitty':
        case 'alacritty':
        case 'foot':
        case 'ghostty':
        case 'xterm':
          execString = `${cleanTerm} -e bash -c "${SCRIPT_CMD}; exec bash"`;
          break;
        case 'konsole':
          execString = `konsole -e bash -c "${SCRIPT_CMD}; exec bash"`;
          break;
        case 'xfce4-terminal':
          execString = `xfce4-terminal -e "bash -c '${SCRIPT_CMD}; exec bash'"`;
          break;
        default:
          execString = `${cleanTerm} -e bash -c "${SCRIPT_CMD}; exec bash"`;
          break;
      }

      const scriptContent = `#!/bin/bash\n${execString}\n`;
      const blob = new Blob([scriptContent], { type: 'application/x-sh' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `run-mtkclient.sh`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      navigator.clipboard.writeText(SCRIPT_CMD);
      closeModal();
    };

    document.querySelectorAll('.term-btn').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        const term = e.target.getAttribute('data-term');
        triggerTerminalLaunch(term);
      });
    });

    runCustomTermBtn.addEventListener('click', () => {
      if (customTermInput.value.trim()) {
        triggerTerminalLaunch(customTermInput.value.trim());
      }
    });

    customTermInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && customTermInput.value.trim()) {
        triggerTerminalLaunch(customTermInput.value.trim());
      }
    });
  </script>
</body>
</html>
