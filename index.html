<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vmlinuz generic</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: monospace;
        }
        #enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            color: #fff;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #video-container {
            width: 100%;
            height: 100%;
            display: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div id="enter-screen">Click to Enter</div>

    <div id="video-container">
        <iframe id="player" src="https://www.youtube.com/embed/P92L7OrdbRM?rel=0&enablejsapi=1" allow="accelerometer *; clipboard-write *; encrypted-media *; gyroscope *; picture-in-picture *; web-share *; autoplay *" referrerpolicy="strict-origin" allowfullscreen></iframe>
    </div>

    <script>
        const enterScreen = document.getElementById('enter-screen');
        const videoContainer = document.getElementById('video-container');
        const player = document.getElementById('player');

        enterScreen.addEventListener('click', () => {
            enterScreen.style.display = 'none';
            videoContainer.style.display = 'block';

            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.mozRequestFullScreen) {
                docElm.mozRequestFullScreen();
            } else if (docElm.webkitRequestFullScreen) {
                docElm.webkitRequestFullScreen();
            } else if (docElm.msRequestFullscreen) {
                docElm.msRequestFullscreen();
            }

            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        });
    </script>
</body>
</html>
